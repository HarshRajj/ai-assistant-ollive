name: CI

on:
  push:
    branches:
      - master
      - 'feature/*'
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
          
      - name: Sync dependencies
        run: uv sync --all-extras
        
      - name: Run Ruff
        run: uv run ruff check
        
      - name: Run Pytest
        run: uv run pytest tests/ -v
